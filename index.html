<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buteco Premium TV</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0d0d0d;
    font-family:Arial, sans-serif;
    color:#fff;
}

.header{
    text-align:center;
    padding:20px;
    background:#111;
    border-bottom:2px solid #FFD700;
}

.header h1{
    color:#FFD700;
    font-size:36px;
}

.container{
    display:flex;
    justify-content:center;
    align-items:flex-start;
    gap:20px;
    padding:20px;
    flex-wrap:wrap;
}

.player-box,
.chat-box{
    background:#1a1a1a;
    padding:10px;
    border-radius:10px;
    box-shadow:0 0 15px rgba(255,215,0,.2);
}

.footer{
    text-align:center;
    padding:15px;
    margin-top:20px;
    background:#111;
    color:#999;
}

@media(max-width:1360px){
    .container{
        flex-direction:column;
        align-items:center;
    }
}
</style>
</head>

<body>

<div class="header">
    <h1>🎵 BUTECO PREMIUM 🎵</h1>
</div>

<div class="container">

    <!-- PLAYER -->
    <div class="player-box">
        <iframe
            name="Player"
            src="//redecanaistv.rodeo/player3/ch.php?canal=cazetv1"
            frameborder="0"
            width="640"
            height="400"
            scrolling="no"
            allow="encrypted-media"
            allowfullscreen>
        </iframe>
    </div>

    <!-- CHAT XAT -->
    <div class="chat-box">
        <iframe
            src="https://xat.com/embed/chat.php#id=220535412&gn=Butecopremium"
            allow="clipboard-write"
            width="650"
            height="486"
            frameborder="0"
            scrolling="no">
        </iframe>
    </div>

</div>

<div class="footer">
    © 2026 Buteco Premium - Rumo ao Hexa 🇧🇷
</div>

</body>
</html>
