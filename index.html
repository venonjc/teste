<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<title>Buteco Premium - Rumo ao Hexa</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(rgba(0,0,0,.75),rgba(0,0,0,.75)),
url('https://images.unsplash.com/photo-1517466787929-bc90951d0974');
background-size:cover;
background-position:center;
background-attachment:fixed;
color:#fff;
}

.top-player{
width:100%;
background:#000;
border-bottom:2px solid #FFD700;
}

.header{
text-align:center;
padding:25px;
background:rgba(0,0,0,.8);
}

.header h1{
font-size:55px;
color:#FFD700;
text-shadow:0 0 20px #FFD700;
}

.header h2{
color:#00ff66;
margin-top:10px;
}

.container{
display:flex;
justify-content:center;
align-items:flex-start;
gap:20px;
padding:20px;
flex-wrap:wrap;
}

.box{
background:rgba(0,0,0,.85);
border:2px solid #FFD700;
border-radius:15px;
padding:10px;
box-shadow:0 0 25px rgba(255,215,0,.4);
}

.titulo{
text-align:center;
font-size:20px;
font-weight:bold;
color:#FFD700;
margin-bottom:10px;
}

.footer{
margin-top:20px;
padding:20px;
background:rgba(0,0,0,.85);
text-align:center;
border-top:2px solid #FFD700;
}

.footer h3{
color:#FFD700;
}

@media(max-width:1360px){

.container{
flex-direction:column;
align-items:center;
}

}

</style>
</head>

<body>

<!-- BARRA DA RADIO -->

<div class="top-player">
<iframe
src="https://player.igng.com.br/player-barra/7018/000000"
